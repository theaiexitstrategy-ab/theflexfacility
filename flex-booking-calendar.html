<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Your Free Consultation — The Flex Facility</title>
  <!-- GoElev8 Portal embed — lead tracking (portal.goelev8.ai is the source of truth) -->
  <script>
    window.GoElev8 = {
      slug: "flex-facility",
      secret: "REPLACE_WITH_GOELEV8_SECRET"
    };
  </script>
  <script src="https://portal.goelev8.ai/embed/track.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8200A;
      --red-dark: #B51A08;
      --black: #080808;
      --dark: #111;
      --card: #141414;
      --text: #F5F5F5;
      --muted: #888;
      --white: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Barlow', sans-serif; background: var(--black); color: var(--text); min-height: 100vh; }

    /* LOGO HEADER */
    .logo-header {
      text-align: center;
      padding: 40px 20px 20px;
    }
    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--white);
    }
    .logo-text span { color: var(--red); }
    .logo-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* BOOKING SECTION */
    .booking-section {
      max-width: 700px;
      margin: 60px auto 0;
      padding: 0 20px 40px;
      text-align: center;
    }
    .booking-section h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .booking-section h2 span { color: var(--red); }
    .booking-section p {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-book {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 18px 48px;
      border-radius: 8px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-book:hover {
      background: var(--red-dark);
      transform: translateY(-2px);
    }
    .btn-book:active { transform: translateY(0); }
    .booking-note {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 14px;
    }

    /* FOOTER */
    .booking-footer {
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .booking-footer p {
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 1px;
    }
    .booking-footer a {
      color: var(--red);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- LOGO -->
  <div class="logo-header">
    <div class="logo-text">THE FLEX <span>FACILITY</span></div>
    <div class="logo-sub">Earth City, MO &middot; Est. 2013</div>
  </div>

  <!-- BOOKING -->
  <section class="booking-section">
    <h2>Book Your <span>Free Session</span></h2>
    <p>Schedule your free consultation with Coach Kenny's team.<br>Pick a time that works for you — it only takes 60 seconds.</p>
    <a href="https://portal.goelev8.ai" target="_blank" rel="noopener" class="btn-book">
      Book Now &rarr;
    </a>
    <p class="booking-note">You'll be taken to our booking portal</p>
  </section>

  <!-- FOOTER -->
  <div class="booking-footer">
    <p>&copy; 2026 Flex Training LLC &middot; <a href="https://theflexfacility.com">theflexfacility.com</a></p>
  </div>

  <script>
    // Auto-redirect to GoElev8 portal with goal param if present
    var params = new URLSearchParams(window.location.search);
    var goal = (params.get('goal') || '').toLowerCase();
    var portalUrl = 'https://portal.goelev8.ai';
    if (goal) portalUrl += '?goal=' + encodeURIComponent(params.get('goal'));
    // Uncomment the line below to auto-redirect instead of showing the page:
    // window.location.href = portalUrl;
  </script>
</body>
</html>
